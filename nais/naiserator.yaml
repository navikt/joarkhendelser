kind: Application
apiVersion: nais.io/v1alpha1
metadata:
  name: {{ APPNAVN }}
  namespace: teamdokumenthandtering
  labels:
    team: teamdokumenthandtering
spec:
  image: {{ image }}
  ingresses:
    {{#each INGRESSES}}
        - {{ this }}
      {{/each}}
  env:
    - name: APPNAVN
      value: {{ APPNAVN }}
    - name: JOURNALFOERINGHENDELSE_TOPIC
      value: {{ JOURNALFOERINGHENDELSE_TOPIC }}
    - name: JOURNALPOSTENDRET_TOPIC
      value: {{ JOURNALPOSTENDRET_TOPIC }}
  liveness:
    path: /actuator/health/liveness
    initialDelay: 20
  readiness:
    path: /actuator/health/readiness
    initialDelay: 20
  port: 8080
  prometheus:
    enabled: true
    path: /actuator/prometheus
  kafka:
    pool: {{ KAFKA_POOL }}
  replicas:
    min: {{ MIN_REPLICAS }}
    max: {{ MAX_REPLICAS }}
    cpuThresholdPercentage: 50
  resources:
    requests:
      cpu: 250m
      memory: 256Mi
    limits:
      memory: 512Mi