application.name=dokarkivhendelser
application.version=@version@
spring.profiles.active=remote
spring.main.banner-mode=off
###############################################
#                    KAFKA                    #
###############################################
spring.kafka.properties.ssl.truststore.location=${javax.net.ssl.trustStore}
spring.kafka.properties.ssl.truststore.***passord=gammelt_passord***}

spring.kafka.client-id=${application.name}
journalpostEndret.topic=privat-dok-journalpostEndret-v1-t6

spring.kafka.producer.acks=all
spring.kafka.producer.retries=2147483647
spring.kafka.producer.properties.max.block.ms=15000
spring.kafka.producer.properties.enable.idempotence=true
spring.kafka.producer.transaction-id-prefix=${application.name}
spring.kafka.producer.properties.max.in.flight.requests.per.connection=5
spring.kafka.producer.key-serializer=io.confluent.kafka.serializers.KafkaAvroSerializer
spring.kafka.producer.value-serializer=io.confluent.kafka.serializers.KafkaAvroSerializer

spring.kafka.consumer.max-poll-records=1
spring.kafka.consumer.poll-timeout=1000
spring.kafka.consumer.enable.auto.commit=false
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.group-id=${application.name}
spring.kafka.consumer.key-deserializer=io.confluent.kafka.serializers.KafkaAvroDeserializer
spring.kafka.consumer.value-deserializer=org.apache.kafka.common.serialization.ByteArrayDeserializer